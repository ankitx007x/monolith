<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith — Study Notes</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e5e5e5;
            --accent-color: #888888;
            --border-color: #222222;
            --hover-color: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 0 20px;
            position: relative;
            min-height: 100vh;
        }

        /* Fixed Background Layer: Keeps the Interstellar imagery perfectly stable on scroll */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                linear-gradient(
                    to bottom, 
                    rgba(10, 10, 10, 0.95) 0%, 
                    rgba(10, 10, 10, 0.5) 30%, 
                    rgba(10, 10, 10, 0.5) 70%, 
                    var(--bg-color) 100%
                ),
                url('https://image.tmdb.org/t/p/original/h2YIl0nobaGLrMh0NoR6MFUfJMc.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 0;
            border-bottom: 1px solid rgba(34, 34, 34, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            transition: color 0.2s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .nav-links a:hover {
            color: var(--hover-color);
        }

        /* Main Container */
        main {
            max-width: 800px;
            margin: 120px auto;
        }

        /* Hero / Combined Header Section */
        .hero-banner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (min-width: 650px) {
            .hero-banner {
                flex-direction: row;
                gap: 30px;
            }
        }

        h1.main-title {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .dirty-job-quote {
            font-family: var(--font-mono);
            color: #b3b3b3;
            font-style: italic;
            font-size: 1rem;
            max-width: 300px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        @media (min-width: 650px) {
            .dirty-job-quote {
                border-left: 2px solid var(--border-color);
                padding-left: 30px;
                text-align: left;
            }
        }

        /* Sub-section & CTA styling */
        .cta-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px dashed rgba(34, 34, 34, 0.5);
        }

        .house-wife-quote {
            font-family: var(--font-mono);
            color: #b3b3b3;
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .cta-button {
            display: inline-block;
            font-family: var(--font-mono);
            color: var(--bg-color);
            background-color: rgba(229, 229, 229, 0.9);
            text-decoration: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--text-color);
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .cta-button:hover {
            background-color: var(--bg-color);
            color: var(--hover-color);
            border-color: var(--hover-color);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        footer {
            max-width: 800px;
            margin: 120px auto 40px auto;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-color);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Monolith</div>
        <ul class="nav-links">
            <li><a href="https://fidelioa.github.io/monolith">Home</a></li>
            <li><a href="https://fidelioa.github.io/monolith/archives">Archives</a></li>
            <li><a href="https://fidelioa.github.io/monolith/about">About</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero-banner">
            <h1 class="main-title">MONOLITH</h1>
            <p class="dirty-job-quote">"It's a dirty job, but somebody's gotta do it."</p>
        </section>

        <section class="cta-section">
            <p class="house-wife-quote">This is not my beautiful house. This is not my beautiful wife.</p>
            <a href="../" class="cta-button">Let's blow this thing and go home!</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MONOLITH. Built to persist.</p>
    </footer>

</body>
</html>
